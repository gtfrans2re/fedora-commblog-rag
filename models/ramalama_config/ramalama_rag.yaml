# ramalama_rag.yaml
#
# RamaLama RAG configuration for the Fedora editorial assistant.
# Covers both the Fedora Community Blog and Fedora Magazine.

# ── Data Sources ──────────────────────────────────────────────────────────────
data:
  sources:
    commblog:
      corpus_dir:    "data/cleaned/commblog"
      guidelines:    "data/guidelines/commblog_guidelines.md"
      oci_image:     "quay.io/gtfrans2re/fedora-commblog-rag"
    magazine:
      corpus_dir:    "data/cleaned/magazine"
      guidelines:    "data/guidelines/magazine_guidelines.md"
      oci_image:     "quay.io/gtfrans2re/fedora-magazine-rag"
    both:
      corpus_dirs:
        - "data/cleaned/commblog"
        - "data/cleaned/magazine"
      guidelines:
        - "data/guidelines/commblog_guidelines.md"
        - "data/guidelines/magazine_guidelines.md"
      oci_image:     "quay.io/gtfrans2re/fedora-editorial-rag"
  file_types:
    - "*.md"

# ── Chunking ──────────────────────────────────────────────────────────────────
chunking:
  strategy:         "recursive"
  chunk_size:       256      # Keeps chunks under the 512-token embedder batch limit
  chunk_overlap:    32
  respect_headings: true

# ── Embedding ─────────────────────────────────────────────────────────────────
embedding:
  model:     "nomic-embed-text"
  normalize: true

# ── Retrieval ─────────────────────────────────────────────────────────────────
retrieval:
  top_k:            5
  score_threshold:  0.65

# ── Generation ────────────────────────────────────────────────────────────────
generation:
  system_prompt: |
    You are an editorial assistant for the Fedora Project's publications:
    the Fedora Community Blog and Fedora Magazine.

    Your role is to help authors check whether their draft articles meet
    the editorial standards of the relevant publication — tone, structure,
    topic scope, technical accuracy, and required elements (featured image,
    Read More tag, tags, category, SEO snippet).

    When reviewing a draft:
    - Identify which publication the article targets (CommBlog or Magazine).
    - Flag specific issues with tone, structure, or technical accuracy.
    - Reference relevant guidelines or past articles when flagging an issue.
    - Be constructive and specific — point to the exact part of the draft.
    - Do not rewrite the article; only provide actionable feedback.
    - End with a clear verdict: READY TO PUBLISH or NEEDS REVISION.

  temperature: 0.3
  max_tokens:  1024

# ── Models ────────────────────────────────────────────────────────────────────
models:
  - name:  "hf://bartowski/google_gemma-4-E4B-it-GGUF"
    label: "Gemma 4 E4B"
  - name:  "hf://ibm-granite/granite-4.0-micro-GGUF"
    label: "Granite 4 Micro"